<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 酒店信息爬取及管理平台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a365d 0%, #2c3e50 50%, #34495e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(212, 175, 55, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(212, 175, 55, 0.08) 0%, transparent 50%);
            pointer-events: none; /* 关键：不拦截点击 */
        }
        .container {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            max-width: 560px;
            width: 100%;
            position: relative;
        }
        .header {
            background: linear-gradient(135deg, #1a365d 0%, #2c3e50 100%);
            color: #fff;
            padding: 24px 22px;
        }
        .header-title { font-size: 22px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        .header-sub { margin-top: 6px; opacity: 0.85; font-size: 13px; }
        .body { padding: 22px 22px 26px; background: #fafafa; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 8px; color: #2c3e50; font-weight: 500; }
        .input-container { position: relative; }
        .input-container i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #8c8c8c; }
        .input-container input {
            width: 100%;
            padding: 12px 14px 12px 42px;
            border: 1px solid #e6e6e6;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: #fff;
        }
        .input-container input:focus { border-color: #1a365d; box-shadow: 0 0 0 3px rgba(26, 54, 93, 0.12); }
        .tips { color: #8c8c8c; font-size: 12px; margin-top: 4px; }
        .actions { display: flex; gap: 12px; align-items: center; justify-content: space-between; margin-top: 10px; }
        .btn {
            width: 100%;
            padding: 12px 16px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #1a365d 0%, #2c3e50 100%);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 8px 18px rgba(26, 54, 93, 0.18);
        }
        .btn:disabled { opacity: 0.7; cursor: not-allowed; }
        .link { color: #1a365d; text-decoration: none; font-size: 14px; }
        .link:hover { text-decoration: underline; }
        .copyright { margin-top: 16px; text-align: center; color: #8c8c8c; font-size: 12px; }
        .toast {
            position: fixed;
            top: 18px;
            right: 18px;
            background: #fff;
            border-radius: 10px;
            padding: 12px 14px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
            display: flex;
            align-items: center;
            gap: 10px;
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity 0.2s, transform 0.2s;
            z-index: 9999;
            border: 1px solid #f0f0f0;
        }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.success { border-color: rgba(34, 197, 94, 0.35); }
        .toast.error { border-color: rgba(255, 77, 79, 0.35); }
        .toast i { color: #1a365d; }
        .toast.error i { color: #ff4d4f; }
        .toast.success i { color: #22c55e; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-title"><i class="fas fa-user-plus"></i> 注册账号</div>
            <div class="header-sub">没有账号？创建一个新账号即可开始使用</div>
        </div>
        <div class="body">
            <form id="registerForm">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <div class="input-container">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" placeholder="至少 3 位" autocomplete="username">
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <div class="input-container">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="至少 6 位" autocomplete="new-password">
                    </div>
                    <div class="tips">建议使用包含字母、数字的强密码</div>
                </div>
                <div class="form-group">
                    <label for="password2">确认密码</label>
                    <div class="input-container">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password2" placeholder="再次输入密码" autocomplete="new-password">
                    </div>
                </div>
                <div class="actions">
                    <button type="submit" class="btn">注册</button>
                </div>
                <div class="copyright">
                    <a class="link" href="login.html">已有账号？去登录</a>
                </div>
            </form>
        </div>
    </div>

    <div id="toast" class="toast">
        <i class="fas fa-info-circle"></i>
        <span id="toastMessage"></span>
    </div>

    <script>
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            const icon = toast.querySelector('i');
            toastMessage.textContent = message;
            toast.className = 'toast ' + type + ' show';
            if (type === 'success') icon.className = 'fas fa-check-circle';
            else if (type === 'error') icon.className = 'fas fa-exclamation-circle';
            else icon.className = 'fas fa-info-circle';
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const password2 = document.getElementById('password2').value;
            const btn = document.querySelector('.btn');

            if (!username) { showToast('请输入用户名', 'error'); return; }
            if (!password) { showToast('请输入密码', 'error'); return; }
            if (password.length < 6) { showToast('密码至少 6 位', 'error'); return; }
            if (password !== password2) { showToast('两次密码不一致', 'error'); return; }

            btn.disabled = true;
            btn.textContent = '注册中...';

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, password2 })
                });
                const payload = await res.json().catch(() => ({}));
                if (!res.ok || payload.success === false) {
                    throw new Error(payload.error || ('注册失败: ' + res.status));
                }
                showToast('注册成功，请登录', 'success');
                setTimeout(() => { window.location.href = 'login.html'; }, 600);
            } catch (err) {
                showToast(err.message || String(err), 'error');
                btn.disabled = false;
                btn.textContent = '注册';
            }
        });
    </script>
</body>
</html>
